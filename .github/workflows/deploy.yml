name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'default-models/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate default model descriptor & gzip compressed versions
        run: |
          cd default-models

          # Enable nullglob so *.ext expands to empty string when no match
          shopt -s nullglob

          # -----------------------------------------------------------------
          # 1. Pick the first non-generated file in the folder as the default
          #    model. The webpage only reads the fixed descriptor file below,
          #    so it never hard-codes any model name.
          # -----------------------------------------------------------------
          first_file=""
          for f in *; do
            if [ -f "$f" ] \
               && [ "$f" != "manifest.json" ] \
               && [ "$f" != "default-model.json" ] \
               && [ "$f" != "model.json" ] \
               && [[ "$f" != *.gz ]]; then
              first_file="$f"
              break
            fi
          done

          if [ -n "$first_file" ]; then
            if [[ "$first_file" == *.json ]]; then
              # A JSON descriptor already describes the default model; reuse it.
              cp "$first_file" default-model.json
            else
              # Generate a JSON descriptor pointing at the first model file.
              echo "{\"name\":\"$first_file\",\"url\":\"./default-models/$first_file\"}" > default-model.json
            fi
            echo "Default model descriptor:"
            cat default-model.json
          else
            rm -f default-model.json
            echo "No default model file found"
          fi

          # -----------------------------------------------------------------
          # 2. Generate .gz compressed versions of all model files to save bandwidth
          # -----------------------------------------------------------------
          echo "Generating .gz compressed models..."
          for ext in glb gltf ply obj stl fbx; do
            for f in *.${ext}; do
              if [ -f "$f" ]; then
                # Always regenerate .gz to keep it up to date
                gzip -k -f -9 "$f"
                echo "  Compressed: $f -> ${f}.gz"
              fi
            done
          done

          # -----------------------------------------------------------------
          # 3. Generate manifest.json with both original and .gz info
          # -----------------------------------------------------------------
          echo '{"files":[' > manifest.json
          first=true
          for ext in glb gltf ply obj stl fbx; do
            for f in *.${ext}; do
              if [ -f "$f" ]; then
                if [ "$first" = true ]; then
                  first=false
                else
                  echo "," >> manifest.json
                fi
                # Check if .gz version exists
                if [ -f "${f}.gz" ]; then
                  orig_size=$(stat -c%s "$f")
                  gz_size=$(stat -c%s "${f}.gz")
                  echo -n "{\"name\":\"$f\",\"path\":\"./default-models/$f\",\"gz\":\"${f}.gz\",\"origSize\":${orig_size},\"gzSize\":${gz_size}}" >> manifest.json
                else
                  echo -n "{\"name\":\"$f\",\"path\":\"./default-models/$f\"}" >> manifest.json
                fi
              fi
            done
          done
          echo ']}' >> manifest.json

          echo "Manifest generated:"
          cat manifest.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
