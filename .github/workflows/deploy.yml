name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'default-models/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate model manifest & gzip compressed versions
        run: |
          cd default-models

          # Enable nullglob so *.ext expands to empty string when no match
          shopt -s nullglob

          # Generate .gz compressed versions to save bandwidth
          echo "Generating .gz compressed models..."
          for ext in glb gltf ply obj stl; do
            for f in *.${ext}; do
              if [ -f "$f" ]; then
                # Always regenerate .gz to keep it up to date
                gzip -k -f -9 "$f"
                echo "  Compressed: $f -> ${f}.gz"
              fi
            done
          done

          # Generate manifest.json with both original and .gz info
          # Collect all model files into a temp list
          echo '{"files":[' > manifest.json
          first=true
          for ext in glb gltf ply obj stl; do
            for f in *.${ext}; do
              if [ -f "$f" ]; then
                if [ "$first" = true ]; then
                  first=false
                else
                  echo "," >> manifest.json
                fi
                # Check if .gz version exists
                if [ -f "${f}.gz" ]; then
                  orig_size=$(stat -c%s "$f")
                  gz_size=$(stat -c%s "${f}.gz")
                  echo -n "{\"name\":\"$f\",\"path\":\"./default-models/$f\",\"gz\":\"${f}.gz\",\"origSize\":${orig_size},\"gzSize\":${gz_size}}" >> manifest.json
                else
                  echo -n "{\"name\":\"$f\",\"path\":\"./default-models/$f\"}" >> manifest.json
                fi
              fi
            done
          done
          echo ']}' >> manifest.json

          echo "Manifest generated:"
          cat manifest.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
