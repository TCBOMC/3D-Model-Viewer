<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer - Mesh & Point Cloud</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        #canvas-container canvas {
            display: block;
        }

        /* UI Overlay */
        #ui {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .panel {
            pointer-events: auto;
        }

        /* Top toolbar */
        #toolbar {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border: none;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 2px 12px rgba(99,102,241,0.35);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99,102,241,0.5);
        }

        .btn-ghost {
            background: rgba(255,255,255,0.06);
            color: #e6edf3;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.12);
        }

        #file-input { display: none; }

        .url-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #url-input {
            width: 260px;
            padding: 8px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #e6edf3;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        #url-input:focus {
            border-color: #6366f1;
        }

        /* Welcome screen */
        #welcome {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(13, 17, 23, 0.92);
            backdrop-filter: blur(20px);
            transition: opacity 0.3s;
        }
        #welcome.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #welcome h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #e6edf3, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        #welcome p.subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 16px;
            margin-bottom: 40px;
        }

        .welcome-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        /* Controls hint */
        #controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            font-size: 12.5px;
            color: rgba(255,255,255,0.35);
            background: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(8px);
            padding: 10px 24px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            z-index: 10;
        }
        #controls-hint kbd {
            display: inline-block;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 5px;
            padding: 2px 7px;
            font-size: 11.5px;
            font-family: inherit;
            margin: 0 3px;
        }

        /* Info panel */
        #info-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 240px;
            background: rgba(13, 17, 23, 0.88);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 18px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #info-panel.show {
            opacity: 1;
            pointer-events: auto;
        }
        #info-panel h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #e6edf3;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 12.5px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-row:last-child { border: none; }
        .info-row .label { color: rgba(255,255,255,0.5); }
        .info-row .value { color: #e6edf3; font-weight: 600; }

        /* Point cloud controls */
        #point-size-row, #point-color-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        #point-size-row label, #point-color-row label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        #point-size-slider {
            width: 100%;
            accent-color: #6366f1;
        }
        #point-color-select {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #e6edf3;
            padding: 6px 10px;
            font-size: 12.5px;
            outline: none;
        }

        /* Loading overlay */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(13, 17, 23, 0.9);
        }
        #loading.show { display: flex; }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #loading-text {
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 16px;
        }

        #loading-progress-wrap {
            width: 280px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }
        #loading-progress-wrap.show { display: block; }

        #loading-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 3px;
            transition: width 0.15s ease;
        }

        #loading-progress-text {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
            display: none;
        }
        #loading-progress-text.show { display: block; }
        #loading-phase {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            margin-top: 4px;
            display: none;
        }
        #loading-phase.show { display: block; }

        /* Drop overlay */
        #drop-overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(99, 102, 241, 0.15);
            border: 3px dashed #6366f1;
            font-size: 24px;
            font-weight: 700;
            color: #6366f1;
        }
        #drop-overlay.show { display: flex; }

        /* FPS counter */
        #fps-counter {
            position: fixed;
            top: 80px;
            left: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            font-family: 'Courier New', monospace;
            z-index: 10;
        }

        /* Mouse mode indicator */
        #mouse-mode-hint {
            color: #6366f1;
            font-weight: 700;
        }

        /* Shortcut warning toast */
        #shortcut-warning {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(234, 179, 8, 0.95);
            color: #000;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 600;
            z-index: 100;
            transition: transform 0.3s ease;
            pointer-events: none;
        }
        #shortcut-warning.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- UI -->
    <div id="ui">
        <!-- Toolbar -->
        <div id="toolbar" class="panel">
            <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                上传模型
            </button>

            <div class="url-bar">
                <input id="url-input" type="text" placeholder="输入模型 URL..." />
                <button class="btn btn-ghost" onclick="loadFromUrl()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    加载
                </button>
            </div>

            <button class="btn btn-ghost" onclick="resetScene()" title="清空场景">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
            </button>

            <button class="btn btn-ghost" onclick="clearCacheAndReload()" title="清除模型缓存">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                清缓存
            </button>
        </div>

        <!-- Controls hint -->
        <div id="controls-hint">
            <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动</span>
            <span><kbd>鼠标</kbd> 环视</span>
            <span><kbd>Shift</kbd> 加速</span>
            <span><kbd>空格</kbd> 上升</span>
            <span><kbd>C</kbd> 下降</span>
            <span><kbd>Alt</kbd> 切换鼠标模式 [<span id="mouse-mode-hint">点击锁定</span>]</span>
            <span style="color:rgba(255,255,255,0.3);">点击画面开始控制</span>
        </div>

        <!-- FPS -->
        <div id="fps-counter">FPS: --</div>

        <!-- Info Panel -->
        <div id="info-panel">
            <h3>模型信息</h3>
            <div class="info-row">
                <span class="label">名称</span>
                <span class="value" id="info-name">-</span>
            </div>
            <div class="info-row">
                <span class="label">类型</span>
                <span class="value" id="info-type">-</span>
            </div>
            <div class="info-row">
                <span class="label">顶点数</span>
                <span class="value" id="info-verts">-</span>
            </div>
            <div class="info-row">
                <span class="label">面数</span>
                <span class="value" id="info-faces">-</span>
            </div>
            <div id="point-size-row" style="display:none;">
                <label>点大小</label>
                <input type="range" id="point-size-slider" min="0.01" max="0.2" step="0.005" value="0.05"
                       oninput="updatePointSize(this.value)">
            </div>
            <div id="point-color-row" style="display:none;">
                <label>着色模式</label>
                <select id="point-color-select" onchange="updatePointColor(this.value)">
                    <option value="original">原始颜色</option>
                    <option value="height">高度映射</option>
                    <option value="normal">法线映射</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Welcome screen -->
    <div id="welcome">
        <h1>3D Model Viewer</h1>
        <p class="subtitle">支持 Mesh 和点云模型 · FPS 风格自由漫游</p>
        <div class="welcome-actions">
            <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                选择模型文件
            </button>
            <span style="color:rgba(255,255,255,0.3);">或拖放文件到此处</span>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">加载中...</p>
        <div id="loading-progress-wrap">
            <div id="loading-progress-bar"></div>
        </div>
        <p id="loading-progress-text"></p>
        <p id="loading-phase"></p>
    </div>

    <!-- Drop overlay -->
    <div id="drop-overlay">释放以加载模型</div>

    <!-- Shortcut warning -->
    <div id="shortcut-warning">已屏蔽浏览器快捷键</div>

    <!-- File input -->
    <input id="file-input" type="file" accept=".glb,.gltf,.ply,.obj,.stl,.fbx,.json" />

    <!-- Three.js + Loaders via CDN (ES Module) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        // ===================== GLOBALS =====================
        let scene, camera, renderer, controls;
        let currentModel = null;
        let pointCloudObj = null;
        let clock = new THREE.Clock();
        let frameCount = 0, lastFpsTime = 0;

        // Mouse mode: true = click-to-lock (default), false = hold-LMB-to-look
        let mouseLockMode = true;

        const moveState = {
            f: false, b: false, l: false, r: false, u: false, d: false, boost: false
        };
        const SPEED = 6.0;
        const BOOST = 3.0;

        // Expose for inline event handlers
        window._scene = null;
        window._currentModel = null;
        window._pointCloudObj = null;


        // Clear all caches and reload
        async function clearCacheAndReload() {
            if (!confirm('确定要清除所有模型缓存吗？\n这不会删除默认模型文件，只会清除浏览器中的缓存。')) return;
            try {
                await clearModelCache();
                // Also clear Service Worker caches if any
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(n => caches.delete(n)));
                }
                alert('缓存已清除，页面将刷新。');
                location.reload();
            } catch (e) {
                alert('清除缓存失败: ' + e.message);
            }
        }

        // ===================== INIT =====================
        function init() {
            console.log('Initializing 3D scene...');

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d1117);
            scene.fog = new THREE.FogExp2(0x0d1117, 0.012);
            window._scene = scene;

            // Camera
            camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 2000);
            camera.position.set(0, 1.6, 6);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
            renderer.setSize(innerWidth, innerHeight);
            renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            console.log('Renderer created, canvas added to DOM');

            // Controls
            controls = new PointerLockControls(camera, renderer.domElement);

            // Lights
            const amb = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(amb);

            const dir = new THREE.DirectionalLight(0xffffff, 1.0);
            dir.position.set(5, 10, 7);
            dir.castShadow = true;
            dir.shadow.mapSize.set(2048, 2048);
            scene.add(dir);

            const hemi = new THREE.HemisphereLight(0x6366f1, 0x0d1117, 0.3);
            scene.add(hemi);

            // Ground grid
            const grid = new THREE.GridHelper(120, 120, 0x21262d, 0x161b22);
            grid.position.y = -0.01;
            scene.add(grid);

            // Axis indicator
            const axes = new THREE.AxesHelper(1.5);
            axes.position.set(0, 0.01, 0);
            scene.add(axes);

            // Events
            setupEvents();

            // Animate
            animate();

            console.log('Initialization complete!');
        }

        // ===================== EVENTS =====================
        function setupEvents() {
            console.log('Setting up events...');

            // Click to lock — behavior depends on mouseLockMode
            renderer.domElement.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return; // only left mouse button
                if (mouseLockMode && !controls.isLocked) {
                    controls.lock();
                    document.getElementById('welcome').classList.add('hidden');
                } else if (!mouseLockMode && !controls.isLocked) {
                    controls.lock();
                }
            });

            // In hold mode: release LMB → unlock
            document.addEventListener('mouseup', (e) => {
                if (e.button !== 0) return;
                if (!mouseLockMode && controls.isLocked) {
                    controls.unlock();
                }
            });

            // Click on welcome screen (outside buttons) to dismiss it and enter scene
            document.getElementById('welcome').addEventListener('click', (e) => {
                if (e.target.closest('.btn')) return;  // don't dismiss when clicking buttons
                document.getElementById('welcome').classList.add('hidden');
                if (mouseLockMode) {
                    setTimeout(() => controls.lock(), 100);
                }
            });

            // Pointer lock change: update cursor style
            document.addEventListener('pointerlockchange', () => {
                if (controls.isLocked) {
                    renderer.domElement.style.cursor = 'none';
                } else {
                    renderer.domElement.style.cursor = 'grab';
                }
            });

            // Keyboard
            document.addEventListener('keydown', e => {
                if (!controls.isLocked) return;

                const isCtrl = e.ctrlKey || e.metaKey;

                // Block Ctrl+<key> browser shortcuts
                if (isCtrl && ['KeyW', 'KeyT', 'KeyN', 'KeyR', 'KeyS', 'KeyP', 'KeyF', 'KeyL', 'KeyK'].includes(e.code)) {
                    e.preventDefault();
                    e.stopPropagation();
                    return;
                }

                // Block F5 (reload) and F3 (find) without Ctrl
                if (e.code === 'F5' || e.code === 'F3') {
                    e.preventDefault();
                    e.stopPropagation();
                    return;
                }

                // Handle our own shortcuts
                switch(e.code) {
                    case 'KeyW': moveState.f = true; break;
                    case 'KeyS': moveState.b = true; break;
                    case 'KeyA': moveState.l = true; break;
                    case 'KeyD': moveState.r = true; break;
                    case 'Space': moveState.u = true; e.preventDefault(); break;
                    case 'KeyC': moveState.d = true; break;
                    case 'ShiftLeft': case 'ShiftRight': moveState.boost = true; break;
                    case 'AltLeft': case 'AltRight':
                        e.preventDefault();
                        mouseLockMode = !mouseLockMode;
                        updateMouseModeHint();
                        if (!mouseLockMode && controls.isLocked) {
                            controls.unlock();
                        }
                        break;
                    case 'Escape':
                        if (mouseLockMode) controls.unlock();
                        break;
                }
            });
            document.addEventListener('keyup', e => {
                switch(e.code) {
                    case 'KeyW': moveState.f = false; break;
                    case 'KeyS': moveState.b = false; break;
                    case 'KeyA': moveState.l = false; break;
                    case 'KeyD': moveState.r = false; break;
                    case 'Space': moveState.u = false; break;
                    case 'KeyC': moveState.d = false; break;
                    case 'ShiftLeft': case 'ShiftRight': moveState.boost = false; break;
                }
            });

            // File input
            document.getElementById('file-input').addEventListener('change', e => {
                if (e.target.files[0]) loadLocalFile(e.target.files[0]);
            });

            // Drag & drop
            const dropOvl = document.getElementById('drop-overlay');
            document.addEventListener('dragover', e => { e.preventDefault(); dropOvl.classList.add('show'); });
            document.addEventListener('dragleave', e => { if (!e.relatedTarget) dropOvl.classList.remove('show'); });
            document.addEventListener('drop', e => {
                e.preventDefault();
                dropOvl.classList.remove('show');
                if (e.dataTransfer.files[0]) loadLocalFile(e.dataTransfer.files[0]);
            });

            // Resize
            window.addEventListener('resize', () => {
                camera.aspect = innerWidth / innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(innerWidth, innerHeight);
            });

            // URL enter key
            document.getElementById('url-input').addEventListener('keypress', e => {
                if (e.key === 'Enter') loadFromUrl();
            });

            console.log('Events setup complete');
        }

        // ===================== MOVEMENT =====================
        function updateMovement() {
            if (!controls.isLocked) return;
            const dt = clock.getDelta();
            const spd = SPEED * (moveState.boost ? BOOST : 1) * dt;

            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0;
            forward.normalize();

            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0;
            right.normalize();

            const dir = new THREE.Vector3();
            if (moveState.f) dir.add(forward);
            if (moveState.b) dir.sub(forward);
            if (moveState.r) dir.add(right);
            if (moveState.l) dir.sub(right);
            if (moveState.u) dir.y += 1;
            if (moveState.d) dir.y -= 1;

            if (dir.lengthSq() > 0) {
                dir.normalize().multiplyScalar(spd);
                camera.position.add(dir);
            }
        }


        // ===================== CACHE (IndexedDB) =====================
        const CACHE_DB_NAME = '3d-model-viewer-cache';
        const CACHE_DB_VERSION = 2;
        const CACHE_STORE_DEFAULT = 'default-models';
        const CACHE_STORE_JSON = 'json-models';

        function openCacheDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(CACHE_DB_NAME, CACHE_DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(CACHE_STORE_DEFAULT)) {
                        db.createObjectStore(CACHE_STORE_DEFAULT, { keyPath: 'url' });
                    }
                    if (!db.objectStoreNames.contains(CACHE_STORE_JSON)) {
                        db.createObjectStore(CACHE_STORE_JSON, { keyPath: 'url' });
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function getCachedModel(url, storeName) {
            const db = await openCacheDB();
            return new Promise((resolve) => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const req = store.get(url);
                req.onsuccess = () => {
                    const result = req.result;
                    if (result && result.buffer) {
                        let buf = result.buffer;
                        // Ensure it's an ArrayBuffer (not Uint8Array)
                        if (buf.byteLength !== undefined && buf.buffer) {
                            buf = buf.buffer;  // Uint8Array -> ArrayBuffer
                        }
                        resolve({ buffer: buf, metadata: result });
                    } else {
                        resolve(null);
                    }
                };
                req.onerror = () => resolve(null);
            });
        }

        async function setCachedModel(url, arrayBuffer, storeName, metadata = {}) {
            const db = await openCacheDB();
            return new Promise((resolve) => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.put({
                    url: url,
                    buffer: arrayBuffer,
                    etag: metadata.etag || '',
                    timestamp: Date.now(),
                    name: metadata.name || '',
                    size: arrayBuffer.byteLength
                });
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }

        async function checkModelETag(url, cachedEtag) {
            try {
                const resp = await fetch(url, { method: 'HEAD' });
                if (!resp.ok) return false;
                const etag = resp.headers.get('etag') || '';
                return etag && cachedEtag && etag === cachedEtag;
            } catch (e) {
                return false;
            }
        }

        async function clearModelCache() {
            const db = await openCacheDB();
            return new Promise((resolve) => {
                [CACHE_STORE_DEFAULT, CACHE_STORE_JSON].forEach((storeName) => {
                    if (db.objectStoreNames.contains(storeName)) {
                        const tx = db.transaction(storeName, 'readwrite');
                        const store = tx.objectStore(storeName);
                        store.clear();
                    }
                });
                // Give transactions a moment to complete; resolve is best-effort
                setTimeout(resolve, 100);
            });
        }


        // Get uncompressed file size via HEAD request (with Accept-Encoding: identity)
        async function getUncompressedSize(url) {
            try {
                const resp = await fetch(url, {
                    method: 'HEAD',
                    headers: { 'Accept-Encoding': 'identity' }
                });
                if (resp.ok) {
                    const size = resp.headers.get('content-length');
                    if (size) return parseInt(size, 10);
                }
            } catch (e) {}
            return 0;
        }

        // Check if a .gz compressed version is available (saves bandwidth)
        async function hasGzVersion(url) {
            // Only for same-origin URLs (GitHub Pages)
            try {
                const gzUrl = url + '.gz';
                const resp = await fetch(gzUrl, { method: 'HEAD' });
                return resp.ok;
            } catch (e) {
                return false;
            }
        }

        // Decompress a gzip ArrayBuffer using DecompressionStream (modern browsers)
        async function decompressGzip(compressedBuffer, onDecompressProgress) {
            const decompressionStream = new DecompressionStream('gzip');
            const writer = decompressionStream.writable.getWriter();
            const reader = decompressionStream.readable.getReader();

            // Write compressed data in chunks
            const totalCompressed = compressedBuffer.byteLength;
            const chunkSize = 64 * 1024;  // 64KB chunks
            let written = 0;

            // Start reading decompressed output in background
            const decompressedChunks = [];
            let totalDecompressed = 0;
            const readPromise = (async () => {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    decompressedChunks.push(value);
                    totalDecompressed += value.byteLength;
                    if (onDecompressProgress) {
                        onDecompressProgress(totalDecompressed);
                    }
                }
            })();

            // Write compressed data
            let offset = 0;
            while (offset < totalCompressed) {
                const chunk = compressedBuffer.slice(offset, offset + chunkSize);
                await writer.write(chunk);
                offset += chunk.byteLength;
            }
            await writer.close();
            await readPromise;

            // Merge decompressed chunks
            const result = new Uint8Array(totalDecompressed);
            let mergeOffset = 0;
            for (const chunk of decompressedChunks) {
                result.set(chunk, mergeOffset);
                mergeOffset += chunk.byteLength;
            }
            return result.buffer;
        }

        // Fetch + decompress .gz file with progress (compressed download + decompression)
        // Returns { buffer: ArrayBuffer }
        async function fetchGzipWithProgress(url, uncompressedSize, onProgress) {
            const gzUrl = url + '.gz';
            const resp = await fetch(gzUrl);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

            const compressedTotal = parseInt(resp.headers.get('content-length') || '0', 10);

            let receivedCompressed = 0;
            const chunks = [];

            if (resp.body) {
                const reader = resp.body.getReader();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedCompressed += value.byteLength;
                    // Show compressed download progress
                    if (compressedTotal > 0) {
                        const pct = Math.round((receivedCompressed / compressedTotal) * 100);
                        onProgress(receivedCompressed, compressedTotal, 'download', pct);
                    } else {
                        onProgress(receivedCompressed, 0, 'download', 0);
                    }
                }
            }

            // Merge compressed chunks
            const compressedBuf = new Uint8Array(receivedCompressed);
            let off = 0;
            for (const chunk of chunks) {
                compressedBuf.set(chunk, off);
                off += chunk.byteLength;
            }

            // Decompress
            onProgress(0, uncompressedSize, 'decompress', 0);
            const decompressed = await decompressGzip(compressedBuf.buffer, (decompressedReceived) => {
                if (uncompressedSize > 0) {
                    const pct = Math.round((decompressedReceived / uncompressedSize) * 100);
                    onProgress(decompressedReceived, uncompressedSize, 'decompress', pct);
                }
            });

            return decompressed;
        }


        // Fetch with IndexedDB cache + progress
        // onProgress(received, total) - total=0 means indeterminate
        // Returns { buffer: ArrayBuffer, fromCache: boolean }
        async function fetchWithCache(url, onProgress, options = {}) {
            const storeName = options.storeName || CACHE_STORE_DEFAULT;
            const metadata = options.metadata || {};

            // Step 1: try IndexedDB cache first
            const cached = await getCachedModel(url, storeName);
            if (cached && cached.buffer) {
                onProgress(cached.buffer.byteLength, cached.buffer.byteLength);
                // Check ETag in background for cache invalidation
                fetch(url, { method: 'HEAD' }).then(resp => {
                    if (resp.ok) {
                        const etag = resp.headers.get('etag') || '';
                        checkModelETag(url, etag).catch(() => {});
                    }
                }).catch(() => {});
                return { buffer: cached.buffer, fromCache: true };
            }

            // Step 2: get uncompressed file size for accurate progress
            const uncompressedSize = await getUncompressedSize(url);

            // Step 3: try .gz version first (smaller download)
            let buf;
            let usedGz = false;
            try {
                // Only try .gz for same-origin URLs
                if (url.startsWith(location.origin) || url.startsWith('./') || url.startsWith('/')) {
                    const hasGz = await hasGzVersion(url);
                    if (hasGz) {
                        usedGz = true;
                        const decompressed = await fetchGzipWithProgress(url, uncompressedSize || 0, (received, total, phase, pct) => {
                            if (phase === 'download') {
                                onProgress(received, total);  // compressed bytes
                            } else {
                                onProgress(received, total);  // decompressed bytes
                            }
                        });
                        buf = decompressed;
                    }
                }
            } catch (e) {
                console.log('Gzip fetch failed, falling back to regular download:', e.message);
            }

            // Step 4: regular download (if .gz not available or failed)
            if (!buf) {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                // Use uncompressedSize from HEAD if available, otherwise fall back to content-length
                let totalBytes = uncompressedSize || 0;
                if (!totalBytes) {
                    const contentLength = resp.headers.get('content-length');
                    totalBytes = contentLength ? parseInt(contentLength, 10) : 0;
                    // If response is gzip-compressed, content-length is compressed size
                    // and received bytes (from ReadableStream) are decompressed -> mismatch
                    // In that case, we can't show accurate total, so set to 0
                    const isCompressed = resp.headers.get('content-encoding') || resp.headers.get('Content-Encoding');
                    if (isCompressed) totalBytes = 0;
                }

                let receivedBytes = 0;
                const chunks = [];

                if (resp.body) {
                    const reader = resp.body.getReader();
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        receivedBytes += value.byteLength;
                        onProgress(receivedBytes, totalBytes);
                    }
                }

                // Merge chunks
                const merged = new Uint8Array(receivedBytes);
                let offset = 0;
                for (const chunk of chunks) {
                    merged.set(chunk, offset);
                    offset += chunk.byteLength;
                }
                buf = merged.buffer;
            }

            // Step 5: save to IndexedDB cache (store decompressed)
            const etag = '';
            setCachedModel(url, buf, storeName, { ...metadata, etag });

            return { buffer: buf, fromCache: false };
        }

        // Unified model download with loading UI and cache
        async function downloadModel(url, displayName, storeName, metadata = {}) {
            showLoading(`下载模型: ${displayName || url.split('/').pop()}`);
            const progressWrap = document.getElementById('loading-progress-wrap');
            const progressBar = document.getElementById('loading-progress-bar');
            const progressText = document.getElementById('loading-progress-text');
            progressWrap.classList.add('show');
            progressText.classList.add('show');

            try {
                const { buffer, fromCache } = await fetchWithCache(url, (received, total) => {
                    if (total > 0) {
                        progressBar.style.width = Math.round((received / total) * 100) + '%';
                        progressText.textContent = `${formatBytes(received)} / ${formatBytes(total)}`;
                    } else {
                        progressText.textContent = formatBytes(received);
                    }
                }, { storeName, metadata });

                if (fromCache) {
                    progressText.textContent = `已缓存 ${formatBytes(buffer.byteLength)}`;
                    progressBar.style.width = '100%';
                }
                return { buffer, fromCache };
            } catch (err) {
                hideLoading();
                throw err;
            }
        }

        // Parse JSON model descriptor(s). Accepts:
        // - {name, url}
        // - {files: [{name, url}, ...]}
        // - [{name, url}, ...]
        function parseModelJson(jsonData) {
            let models = [];
            if (Array.isArray(jsonData)) {
                models = jsonData;
            } else if (jsonData && jsonData.files && Array.isArray(jsonData.files)) {
                models = jsonData.files;
            } else if (jsonData && jsonData.url) {
                models = [jsonData];
            }
            return models.filter(m => m && m.url);
        }

        // Load the first model described by a JSON object
        async function loadJsonModel(jsonData, source = 'default') {
            const models = parseModelJson(jsonData);
            if (models.length === 0) {
                hideLoading();
                alert('JSON 中没有找到有效的模型 URL');
                return;
            }
            const entry = models[0];
            const url = entry.url;
            const name = entry.name || url.split('/').pop();
            const storeName = source === 'default' ? CACHE_STORE_DEFAULT : CACHE_STORE_JSON;

            const { buffer } = await downloadModel(url, name, storeName, { name });

            if (buffer.byteLength < 100) {
                hideLoading();
                alert('模型文件太小，可能下载失败');
                return;
            }

            const extName = url.split('/').pop().toLowerCase();
            if (extName.endsWith('.glb') || extName.endsWith('.gltf')) {
                loadGLTF(buffer, name);
            } else if (extName.endsWith('.ply')) {
                loadPLY(buffer, name);
            } else if (extName.endsWith('.obj')) {
                loadOBJ(buffer, name);
            } else if (extName.endsWith('.stl')) {
                loadSTL(buffer, name);
            } else if (extName.endsWith('.fbx')) {
                loadFBX(buffer, name);
            } else {
                loadGLTF(buffer, name);
            }
        }

                function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function loadLocalFile(file) {

                    loadGLTF(buf, file.name);
                } else if (name.endsWith('.ply')) {
                    loadPLY(buf, file.name);
                } else if (name.endsWith('.obj')) {
                    loadOBJ(buf, file.name);
                } else if (name.endsWith('.stl')) {
                    loadSTL(buf, file.name);
                } else if (name.endsWith('.fbx')) {

                }
            };
            reader.readAsArrayBuffer(file);
        }

        // ===================== LOADERS =====================
        function loadGLTF(buffer, fileName) {
            console.log('Loading GLTF:', fileName);
            const loader = new GLTFLoader();
            loader.parse(buffer, '', (gltf) => {
                const model = gltf.scene;
                clearModel();
                // Center and scale
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = maxDim > 0 ? 5.0 / maxDim : 1;
                model.position.sub(center);
                model.scale.setScalar(scale);
                model.position.y += size.y * scale * 0.5;

                // Enable shadows
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(model);
                currentModel = model;
                window._currentModel = model;

                // Update info
                let vertCount = 0, faceCount = 0;
                model.traverse((child) => {
                    if (child.isMesh && child.geometry) {
                        vertCount += child.geometry.attributes.position.count;
                        if (child.geometry.index) faceCount += child.geometry.index.count / 3;
                        else faceCount += child.geometry.attributes.position.count / 3;
                    }
                });
                updateInfoPanel(fileName, 'GLB/GLTF', vertCount, Math.round(faceCount));

                hideLoading();
                document.getElementById('welcome').classList.add('hidden');
                console.log('GLTF loaded successfully');
            }, (err) => {
                console.error('GLTF load error:', err);
                hideLoading();
                alert('模型加载失败: ' + err.message);
            });
        }

        function loadPLY(buffer, fileName) {
            console.log('Loading PLY:', fileName);
            const loader = new PLYLoader();
            const geom = loader.parse(buffer);
            const isPointCloud = geom.attributes.position.count > 100000 || !geom.index;

            clearModel();

            if (isPointCloud) {
                const material = new THREE.PointsMaterial({
                    size: 0.05,
                    vertexColors: geom.attributes.color ? true : false,
                    sizeAttenuation: true
                });
                const points = new THREE.Points(geom, material);
                scene.add(points);
                pointCloudObj = points;
                window._pointCloudObj = points;

                document.getElementById('point-size-row').style.display = 'flex';
                document.getElementById('point-color-row').style.display = 'flex';
            } else {
                const material = new THREE.MeshStandardMaterial({ color: 0x6366f1, roughness: 0.5, metalness: 0.3 });

                scene.add(mesh);

            console.log('PLY loaded successfully');

        // ===================== DEFAULT MODEL AUTO-LOAD =====================
        async function loadDefaultModel() {
            const candidates = [
                './default-models/model.json',
                './default-models/model.glb',
                './default-models/model.gltf',
                './default-models/model.ply',
                './default-models/model.obj',
                './default-models/model.stl',
                './default-models/model.fbx',
            ];

            document.getElementById('welcome').classList.add('hidden');
            showLoading('\u68C0\u67E5\u9ED8\u8BA4\u6A21\u578B...');

            let jsonData = null;
            let modelPath = null;

            // Step 1: try model.json (JSON model descriptor)
            try {
                const jsonResp = await fetch('./default-models/model.json?t=' + Date.now());
                if (jsonResp.ok) {
                    jsonData = await jsonResp.json();
                }
            } catch (e) {}

            if (jsonData) {
                try {
                    await loadJsonModel(jsonData, 'default');
                    return;
                } catch (err) {
                    console.log('Default JSON model failed, falling back to direct files:', err.message);
                }
            }

            // Step 2: probe direct model candidates
            if (!modelPath) {
                for (const candidate of candidates.slice(1)) {
                    try {
                        const resp = await fetch(candidate, { method: 'HEAD' });
                        if (resp.ok) { modelPath = candidate; break; }
                    } catch (e) {}
                }
            }

            if (!modelPath) {
                hideLoading();
                console.log('No default model found, showing empty scene');
                return;
            }

            // Step 3: download direct model with progress and cache
            const displayName = modelPath.split('/').pop().replace(/\.[^/.]+$/, '');
            try {
                const { buffer: buf, fromCache } = await downloadModel(modelPath, displayName, CACHE_STORE_DEFAULT, { name: displayName });

                if (buf.byteLength < 100) {
                    hideLoading();
                    console.log('Default model file too small, showing empty scene');
                    return;
                }

                const name = modelPath.split('/').pop().toLowerCase();
                if (name.endsWith('.glb') || name.endsWith('.gltf')) {
                    loadGLTF(buf, displayName);
                } else if (name.endsWith('.ply')) {
                    loadPLY(buf, displayName);
                } else if (name.endsWith('.obj')) {
                    loadOBJ(buf, displayName);
                } else if (name.endsWith('.stl')) {
                    loadSTL(buf, displayName);
                } else if (name.endsWith('.fbx')) {
                    loadFBX(buf, displayName);
                } else {
                    loadGLTF(buf, displayName);
                }
            } catch (err) {
                hideLoading();
                console.log('Default model load failed:', err.message);
            }
        }

        // ===================== HELPERS =====================
        function clearModel() {
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
                window._currentModel = null;
            }
            if (pointCloudObj) {
                scene.remove(pointCloudObj);
                pointCloudObj = null;
                window._pointCloudObj = null;
            }
            document.getElementById('info-panel').classList.remove('show');
            document.getElementById('point-size-row').style.display = 'none';
            document.getElementById('point-color-row').style.display = 'none';
        }

        function resetScene() {
            clearModel();
            document.getElementById('welcome').classList.remove('hidden');
        }

        function updateInfoPanel(name, type, verts, faces) {
            document.getElementById('info-name').textContent = name;
            document.getElementById('info-type').textContent = type;
            document.getElementById('info-verts').textContent = verts.toLocaleString();
            document.getElementById('info-faces').textContent = faces !== '-' ? faces.toLocaleString() : '-';
            document.getElementById('info-panel').classList.add('show');
        }

        function updatePointSize(val) {
            if (pointCloudObj) {
                pointCloudObj.material.size = parseFloat(val);
            }
        }

        function updatePointColor(mode) {
            if (!pointCloudObj) return;
            const geom = pointCloudObj.geometry;
            const positions = geom.attributes.position;
            const colors = [];

            if (mode === 'height') {
                const yMin = -5, yMax = 5;
                for (let i = 0; i < positions.count; i++) {
                    const y = (positions.getY(i) - yMin) / (yMax - yMin);
                    const r = Math.max(0, Math.min(1, 2 * (1 - y)));
                    const g = Math.max(0, Math.min(1, 2 * (y < 0.5 ? y * 2 : 2 - y * 2)));
                    const b = Math.max(0, Math.min(1, 2 * (1 - Math.abs(y - 0.5) * 2)));
                    colors.push(r, g, b);
                }
            } else if (mode === 'normal') {
                if (geom.attributes.normal) {
                    for (let i = 0; i < positions.count; i++) {
                        colors.push(
                            (geom.attributes.normal.getX(i) + 1) / 2,
                            (geom.attributes.normal.getY(i) + 1) / 2,
                            (geom.attributes.normal.getZ(i) + 1) / 2
                        );
                    }
                } else {
                    for (let i = 0; i < positions.count; i++) colors.push(1, 1, 1);
                }
            } else {
                // original - keep existing colors or white
                if (geom.attributes.color) return;
                for (let i = 0; i < positions.count; i++) colors.push(1, 1, 1);
            }

            if (colors.length > 0) {
                geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                pointCloudObj.material.vertexColors = true;
                pointCloudObj.material.needsUpdate = true;
            }
        }

        function updateMouseModeHint() {
            const hint = document.getElementById('mouse-mode-hint');
            if (hint) {
                hint.textContent = mouseLockMode ? '点击锁定' : '按住左键锁定';
            }
        }

        function showShortcutWarning(shortcut) {
            const toast = document.getElementById('shortcut-warning');
            toast.textContent = `已屏蔽浏览器快捷键: ${shortcut}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ===================== ANIMATE =====================
        function animate() {
            requestAnimationFrame(animate);
            updateMovement();

            // FPS counter
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                document.getElementById('fps-counter').textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsTime = now;
            }

            renderer.render(scene, camera);
        }

        // ===================== START =====================
        console.log('Starting 3D Model Viewer...');
        init();
        lastFpsTime = performance.now();
        updateMouseModeHint();
        renderer.domElement.style.cursor = 'grab';

        // Try to load default model
        loadDefaultModel();

        // Expose functions called from HTML inline event handlers (onclick / oninput)
        window.loadFromUrl = loadFromUrl;
        window.resetScene = resetScene;
        window.clearCacheAndReload = clearCacheAndReload;

        async function loadFromUrl() {
            const url = document.getElementById('url-input').value.trim();
            if (!url) return;
            console.log('Loading from URL:', url);

            try {
                if (url.toLowerCase().endsWith('.json')) {
                    showLoading('从 URL 读取配置...');
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const json = await resp.json();
                    await loadJsonModel(json, 'local');
                    return;
                }

                const name = url.split('/').pop();
                const { buffer: buf, fromCache } = await downloadModel(url, name, CACHE_STORE_JSON, { name });

                const extName = name.toLowerCase();
                if (extName.endsWith('.glb') || extName.endsWith('.gltf')) {
                    loadGLTF(buf, name);
                } else if (extName.endsWith('.ply')) {
                    loadPLY(buf, name);
                } else if (extName.endsWith('.obj')) {
                    loadOBJ(buf, name);
                } else if (extName.endsWith('.stl')) {
                    loadSTL(buf, name);
                } else if (extName.endsWith('.fbx')) {
                    loadFBX(buf, name);
                } else {
                    loadGLTF(buf, name);
                }
            } catch (err) {
                hideLoading();
                alert('URL 加载失败: ' + err.message);
            }
        }

    </script>
</body>
</html>
